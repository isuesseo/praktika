<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Слайдер</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .slider {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 500px;
            text-align: center;
        }

        .slider img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .counter {
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="slider">
        <img id="slide" src="" alt="картинка">
        <div class="counter">
            <span id="counter">1</span> / <span id="total">5</span>
        </div>
        <div>
            <button id="prev">Назад</button>
            <button id="next">Вперед</button>
        </div>
    </div>

    <script>
        let pictures = [
            "https://picsum.photos/id/1/400/300",
            "https://picsum.photos/id/2/400/300",
            "https://picsum.photos/id/3/400/300",
            "https://picsum.photos/id/4/400/300",
            "https://picsum.photos/id/5/400/300"
        ];
        
        let number = 0;
        let total = pictures.length;
        
        let img = document.getElementById("slide");
        let counterSpan = document.getElementById("counter");
        let totalSpan = document.getElementById("total");
        
        totalSpan.textContent = total;
        
        function showImage() {
            img.src = pictures[number];
            counterSpan.textContent = number + 1;
        }
        
        function nextSlide() {
            number = number + 1;
            if (number >= total) {
                number = 0;
            }
            showImage();
        }
        
        function prevSlide() {
            number = number - 1;
            if (number < 0) {
                number = total - 1;
            }
            showImage();
        }
        
        let nextBtn = document.getElementById("next");
        let prevBtn = document.getElementById("prev");
        
        nextBtn.onclick = nextSlide;
        prevBtn.onclick = prevSlide;
        
        showImage();
    </script>
</body>
</html>
